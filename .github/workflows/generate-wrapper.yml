name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create wrapper files
        run: |
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar from official source
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"
          
          # Create properties file
          cat > gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download gradlew script
          curl -L -o gradlew \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradlew"
          chmod +x gradlew
          
          # Download gradlew.bat
          curl -L -o gradlew.bat \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradlew.bat"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/
          git diff --staged --quiet || git commit -m "Add Gradle wrapper"
          git push origin HEAD:${{ github.ref_name }}
