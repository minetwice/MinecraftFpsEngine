name: Full Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build Native Engine
        run: |
          cd native-engine
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/26.1.10909125/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a ..
          make
          cp libfilter_engine.so ../../android-launcher/app/src/main/jniLibs/arm64-v8a/
      
      - name: Build Java Agent
        run: |
          cd java-agent
          javac -d out src/main/java/com/minefilter/agent/*.java
          jar cfm agent.jar META-INF/MANIFEST.MF -C out .
          cp agent.jar ../android-launcher/app/libs/
      
      - name: Build Android App
        run: |
          cd android-launcher
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-fps-launcher
          path: android-launcher/app/build/outputs/apk/release/*.apk
