name: Generate Gradle Wrapper

on:
  workflow_dispatch:        # Manual trigger
  # push:                   # Uncomment to auto-run on push
  #   branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download and install Gradle (temporary)
        run: |
          GRADLE_VERSION=8.10.2
          wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip gradle-${GRADLE_VERSION}-bin.zip
          # Move to /opt so it's in PATH for next steps
          sudo mv gradle-${GRADLE_VERSION} /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Generate Gradle wrapper files
        run: |
          # Run the wrapper task – this creates all files (gradlew, gradlew.bat, gradle-wrapper.jar, properties)
          gradle wrapper --gradle-version 8.10.2
          # Ensure gradlew is executable
          chmod +x gradlew

      - name: Remove temporary Gradle installation
        run: sudo rm -rf /opt/gradle

      - name: Commit and push generated wrapper files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/
          git diff --staged --quiet || git commit -m "Generate Gradle wrapper (version 8.10.2)"
          git push origin HEAD:${{ github.ref_name }}
        env:
          # GITHUB_TOKEN already has write permissions by default
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
