name: Error Analyzer Bot 🤖

on:
  workflow_run:
    workflows: ["Build Minecraft FPS Engine"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:   # manual trigger bhi

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: logs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Fetch error logs via API if artifact missing
        id: fetch_logs
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" > jobs.json
          # Extract step failure messages
          jq -r '.jobs[].steps[] | select(.conclusion=="failure") | .name + ": " + .logs_url' jobs.json > error_summary.txt
          cat error_summary.txt
          echo "error_log=$(cat error_summary.txt | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: Analyze errors with Python
        id: analyze
        run: |
          cat > analyze.py << 'EOF'
          import re, sys, os
          error_text = """${{ steps.fetch_logs.outputs.error_log }}"""
          if not error_text:
              error_text = os.getenv("ERROR_TEXT", "")

          suggestions = []
          error_type = "unknown"

          # Categorize errors
          if re.search(r"gradlew.*not found|wrapper.*missing", error_text, re.I):
              error_type = "missing_gradle_wrapper"
              suggestions.append("🔧 Run `gradle wrapper` or run the 'Generate Gradle Wrapper' workflow.")
              suggestions.append("📁 Ensure gradle/wrapper/gradle-wrapper.jar is committed.")
          elif re.search(r"permission denied.*gradlew", error_text, re.I):
              error_type = "gradlew_permission"
              suggestions.append("🔧 Run `chmod +x gradlew` and commit.")
          elif re.search(r"unsupported class file version|java version", error_text, re.I):
              error_type = "java_version"
              suggestions.append("☕ Use Java 17 or 21. Setup Java step should specify distribution 'temurin' version '17' or '21'.")
          elif re.search(r"sdk.dir|ANDROID_HOME|android sdk not found", error_text, re.I):
              error_type = "android_sdk_missing"
              suggestions.append("📱 Add action 'android-actions/setup-android@v3' before build steps.")
          elif re.search(r"cmake.*not found", error_text, re.I):
              error_type = "cmake_missing"
              suggestions.append("🛠️ Install CMake: `sudo apt update && sudo apt install cmake -y` or use GitHub's ubuntu-latest which includes it.")
          elif re.search(r"ndk.*not found|NDK not configured", error_text, re.I):
              error_type = "ndk_missing"
              suggestions.append("📦 Setup NDK: add `uses: nttld/setup-ndk@v1` with `ndk-version: r26c`")
          elif re.search(r"gradle.*dep.*cache|corrupt", error_text, re.I):
              error_type = "gradle_cache"
              suggestions.append("🗑️ Clear Gradle cache: `rm -rf ~/.gradle/caches/` or add `cache: false` in setup-java action.")
          elif re.search(r"aapt2? not found|android resource", error_text, re.I):
              error_type = "build_tools_missing"
              suggestions.append("🔧 Install build-tools via SDK: `sdkmanager 'build-tools;34.0.0'`")
          else:
              suggestions.append("🤷 No common pattern detected. Check full logs: " + error_text[:200])

          # Output formatted
          print("::group::🔍 Error Analysis")
          print(f"Error type: {error_type}")
          print("\n📌 Suggestions:")
          for s in suggestions:
              print(f"  - {s}")
          print("::endgroup::")

          # Save to output for later steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"error_type={error_type}\n")
              f.write(f"suggestions={chr(10).join(suggestions)}\n")
          EOF

          python3 analyze.py
        env:
          ERROR_TEXT: ${{ steps.fetch_logs.outputs.error_log }}

      - name: Find or create PR comment with suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const errorType = process.env.ERROR_TYPE;
            const suggestions = process.env.SUGGESTIONS;
            const runId = process.env.RUN_ID;
            
            // Get the PR number (if this run is from a PR)
            const { data: runs } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            const prNumber = runs.pull_requests?.[0]?.number;
            
            if (prNumber) {
              // Post a comment on the PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## 🤖 Error Analysis Bot\n\n**Error category:** ${errorType}\n\n**Suggestions:**\n${suggestions.replace(/\n/g, '\n')}\n\n> Auto-detected from build run: ${runId}`
              });
            } else {
              // Write to workflow summary
              const summary = `
  ### 🤖 Error Analysis
  **Error category:** ${errorType}
  **Suggestions:**
  ${suggestions}
  `;
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
            }
        env:
          ERROR_TYPE: ${{ steps.analyze.outputs.error_type }}
          SUGGESTIONS: ${{ steps.analyze.outputs.suggestions }}
          RUN_ID: ${{ github.event.workflow_run.id }}
