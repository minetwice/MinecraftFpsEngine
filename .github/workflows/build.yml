name: Build Minecraft FPS Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ===================================================
      # 1. Build Native Engine (C++ with CMake)
      # ===================================================
      - name: Build Native Engine
        run: |
          # Go into the native engine directory (underscore)
          cd native_engine
          # Create build folder
          mkdir -p build && cd build
          # Configure with CMake (for Android ARM64)
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/26.1.10909125/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          # Build the library
          make -j$(nproc)
          # Copy the compiled .so to the Android project's jniLibs folder
          # (assuming app/src/main/jniLibs/arm64-v8a/ exists)
          cd ../..  # back to repository root
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp native_engine/build/libfilter_engine.so app/src/main/jniLibs/arm64-v8a/

      # ===================================================
      # 2. Build Java Agent (plain Java JAR)
      # ===================================================
      - name: Build Java Agent
        run: |
          cd java_agent
          # Compile the agent code
          javac -cp ".:lib/*" src/main/java/com/minefilter/agent/*.java -d out/
          # Create JAR with manifest
          echo "Premain-Class: com.minefilter.agent.AgentMain" > manifest.txt
          echo "Can-Redefine-Classes: true" >> manifest.txt
          echo "Can-Retransform-Classes: true" >> manifest.txt
          jar cfm agent.jar manifest.txt -C out/ .
          # Copy to Android assets
          cd ..
          mkdir -p app/src/main/assets
          cp java_agent/agent.jar app/src/main/assets/

      # ===================================================
      # 3. Build Android Launcher App (Gradle)
      # ===================================================
      - name: Build Android App
        run: |
          cd app
          # Make gradlew executable (if not already)
          chmod +x gradlew
          # Build release APK
          ./gradlew assembleRelease --stacktrace

      # ===================================================
      # 4. Upload build artifacts
      # ===================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minefilter-launcher-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Native Library (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: native-engine-lib
          path: native_engine/build/libfilter_engine.so

      - name: Upload Java Agent JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-agent
          path: java_agent/agent.jar
