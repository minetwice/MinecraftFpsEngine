name: Build Minecraft FPS Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit wrapper if generated

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c
          add-to-path: false
          local-cache: true

      # ===================================================
      # 0. Ensure Gradle Wrapper exists at root
      # ===================================================
      - name: Setup Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found, generating..."
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"
            cat > gradle/wrapper/gradle-wrapper.properties <<EOF
            distributionBase=GRADLE_USER_HOME
            distributionPath=wrapper/dists
            distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip
            zipStoreBase=GRADLE_USER_HOME
            zipStorePath=wrapper/dists
            EOF
            curl -L -o gradlew "https://github.com/gradle/gradle/raw/v8.10.2/gradlew"
            curl -L -o gradlew.bat "https://github.com/gradle/gradle/raw/v8.10.2/gradlew.bat"
            chmod +x gradlew
          else
            echo "Gradle wrapper already exists"
          fi

      # ===================================================
      # 1. Build Native Engine (C++ with CMake + NDK)
      # ===================================================
      - name: Build Native Engine
        run: |
          # Get NDK path
          NDK_HOME="${{ steps.setup-ndk.outputs.ndk-path }}"
          if [ -z "$NDK_HOME" ]; then
            NDK_HOME="/usr/local/lib/android/sdk/ndk/26.1.10909125"
          fi
          echo "Using NDK at: $NDK_HOME"
          
          # Detect native engine folder
          if [ -d "native_engine" ]; then
            ENGINE_DIR="native_engine"
          elif [ -d "native-engine" ]; then
            ENGINE_DIR="native-engine"
          else
            echo "❌ No native_engine or native-engine folder found"
            exit 1
          fi
          
          cd $ENGINE_DIR
          mkdir -p build && cd build
          
          TOOLCHAIN="$NDK_HOME/build/cmake/android.toolchain.cmake"
          cmake -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-24 \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          make -j$(nproc)
          
          cd ../..
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp $ENGINE_DIR/build/libfilter_engine.so app/src/main/jniLibs/arm64-v8a/

      # ===================================================
      # 2. Build Java Agent
      # ===================================================
      - name: Build Java Agent
        run: |
          cd java_agent
          mkdir -p out lib
          # Download ASM if not present
          if [ ! -f "lib/asm-9.6.jar" ]; then
            wget -q -O lib/asm-9.6.jar https://repo1.maven.org/maven2/org/ow2/asm/asm/9.6/asm-9.6.jar
          fi
          # Compile
          javac -cp "lib/*" -d out src/main/java/com/minefilter/agent/*.java
          # Manifest
          echo "Premain-Class: com.minefilter.agent.AgentMain" > manifest.txt
          echo "Can-Redefine-Classes: true" >> manifest.txt
          echo "Can-Retransform-Classes: true" >> manifest.txt
          jar cfm agent.jar manifest.txt -C out/ .
          cd ..
          mkdir -p app/src/main/assets
          cp java_agent/agent.jar app/src/main/assets/

      # ===================================================
      # 3. Build Android App from Root (using :app module)
      # ===================================================
      - name: Build Android App
        run: |
          # Run Gradle from root to build the 'app' module
          ./gradlew :app:assembleRelease --stacktrace

      # ===================================================
      # 4. Upload Artifacts
      # ===================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minefilter-launcher
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Native Library
        uses: actions/upload-artifact@v4
        with:
          name: libfilter_engine.so
          path: native_engine/build/libfilter_engine.so

      - name: Upload Java Agent
        uses: actions/upload-artifact@v4
        with:
          name: agent.jar
          path: java_agent/agent.jar
