name: Build Minecraft FPS Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-33 build-tools;33.0.0 ndk;26.1.10909125

      # -------------------------------------------------
      # FORCE setup Gradle wrapper (overwrite existing)
      # -------------------------------------------------
      - name: Setup Gradle wrapper (force)
        run: |
          mkdir -p gradle/wrapper
          # Download gradle-wrapper.jar from official source
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar"
          # Create properties file
          cat > gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          # Download gradlew scripts
          curl -L -o gradlew "https://github.com/gradle/gradle/raw/v8.10.2/gradlew"
          curl -L -o gradlew.bat "https://github.com/gradle/gradle/raw/v8.10.2/gradlew.bat"
          chmod +x gradlew

      - name: Build Native Engine
        run: |
          NDK_HOME="${ANDROID_SDK_ROOT}/ndk/26.1.10909125"
          if [ ! -d "$NDK_HOME" ]; then
            NDK_HOME="${ANDROID_HOME}/ndk/26.1.10909125"
          fi
          if [ ! -d "$NDK_HOME" ]; then
            echo "NDK not found"
            exit 1
          fi
          echo "Using NDK: $NDK_HOME"

          if [ -d "native_engine" ]; then
            ENGINE_DIR="native_engine"
          elif [ -d "native-engine" ]; then
            ENGINE_DIR="native-engine"
          else
            echo "No native engine folder"
            exit 1
          fi

          cd $ENGINE_DIR
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE="$NDK_HOME/build/cmake/android.toolchain.cmake" \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-24 \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" \
                -DCMAKE_CXX_COMPILER="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++" \
                ..
          make -j$(nproc)
          cd ../..
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp $ENGINE_DIR/build/libfilter_engine.so app/src/main/jniLibs/arm64-v8a/

      - name: Build Java Agent
        run: |
          cd java_agent
          mkdir -p out lib
          wget -q -O lib/asm-9.6.jar https://repo1.maven.org/maven2/org/ow2/asm/asm/9.6/asm-9.6.jar
          javac -cp "lib/*" -d out src/main/java/com/minefilter/agent/*.java
          echo 'Premain-Class: com.minefilter.agent.AgentMain' > manifest.txt
          echo 'Can-Redefine-Classes: true' >> manifest.txt
          echo 'Can-Retransform-Classes: true' >> manifest.txt
          jar cfm agent.jar manifest.txt -C out/ .
          cd ..
          mkdir -p app/src/main/assets
          cp java_agent/agent.jar app/src/main/assets/

      - name: Build Android App
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minefilter-launcher
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Native Library
        uses: actions/upload-artifact@v4
        with:
          name: libfilter_engine.so
          path: native_engine/build/libfilter_engine.so

      - name: Upload Java Agent
        uses: actions/upload-artifact@v4
        with:
          name: agent.jar
          path: java_agent/agent.jar
